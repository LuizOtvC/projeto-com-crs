<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Lista de funcionarios</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <table>
            <tr>
                <th> Id </th>
                    <th> Nome </th>
                    <th> Cargo </th>
                    <th> Departamento </th>
                    <th> Email </th>
                    <th> Contratação </th>
                    <th> Ações </th>
            </tr>
            <tr  th:each="f : ${lista}">  
                    <td th:text="${f.id}"></td>
                    <td th:text="${f.nome}"></td>
                    <td th:text="${f.cargo}"></td>
                    <td th:text="${f.departamento}"></td>
                    <td th:text="${f.email}"></td>
                    <td th:text="${f.dataContratacao}"></td>                    
                    <td>
                        <a  th:href="@{/perfil(id=${f.id})}">Editar</a>
                    </td>
                </tr>
        </table>
        
        <br>
        <a href="/adicionar-novo">Adicionar novo</a>
    </body>
</html>
